name: CD - Deploy to EC2

on:
  workflow_run:
    workflows:
      - "CI - Build & Push Docker Image"
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Docker Container to EC2

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST_DNS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_USERNAME }}/myapp"
            TAG="${{ github.event.workflow_run.head_sha }}"

            echo "Deploying image: ${IMAGE}:${TAG}"

            # Install Docker only if it is not already installed
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # Login to Docker Hub (required for private repositories)
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" \
              --password-stdin

            # Pull latest image
            sudo docker pull ${IMAGE}:${TAG}

            # Stop and remove existing container
            sudo docker stop myapp || true
            sudo docker rm myapp || true

            # Start new container
            sudo docker run -d \
              --name myapp \
              --restart unless-stopped \
              -p 80:80 \
              ${IMAGE}:${TAG}

            # Remove unused images
            sudo docker image prune -af

            echo "Deployment completed successfully."
